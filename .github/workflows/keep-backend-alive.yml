name: Keep Backend Alive

on:
  schedule:
    # Every 5 minutes. Render free tier spins down after ~15 min idle.
    # GitHub cron can lag 15-30 min under load, so ping frequently.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://niftyedge-backend.onrender.com' }}
        run: |
          echo "Pinging $BACKEND_URL/health"
          curl --silent --show-error \
            --connect-timeout 30 --max-time 180 \
            --retry 3 --retry-delay 15 --retry-all-errors \
            "$BACKEND_URL/health"
          echo "Ping complete (exit $?)"
