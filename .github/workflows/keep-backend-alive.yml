name: Keep Backend Alive

on:
  schedule:
    # Every 10 minutes. Render free tier spins down after ~15 min idle.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://niftyedge-backend.onrender.com' }}
        run: |
          echo "Pinging $BACKEND_URL/health"
          curl --fail --silent --show-error --max-time 60 "$BACKEND_URL/health" || exit 1
