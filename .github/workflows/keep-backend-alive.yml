name: Keep Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -sS --fail --retry 5 --retry-delay 10 --retry-all-errors \
               --max-time 60 \
               -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
               https://niftyedge-backend.onrender.com/health
